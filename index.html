<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>挪车联系</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:"Microsoft YaHei",Arial;
}

.card{
    width:90%;
    max-width:380px;
    background:white;
    padding:40px 25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

.car{
    font-size:60px;
}

h1{
    font-size:32px;
    color:#222;
    margin:15px 0;
}

.tip{
    color:#666;
    font-size:18px;
    line-height:1.8;
}

.phone{
    display:block;
    margin-top:30px;
    padding:18px;
    background:#07c160;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:26px;
    font-weight:bold;
}

.phone:active{
    transform:scale(0.96);
}

.footer{
    margin-top:25px;
    color:#999;
    font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<div class="car">
🚗
</div>

<h1>挪车联系</h1>

<div class="tip">
如需挪车<br>
请点击下面按钮联系车主
</div>

<a class="phone" href="tel:18805378087">
📞 联系车主
</a>

<div class="footer">
感谢理解与配合
</div>

</div>

</body>
</html>
